# FSx for Lustre PV/PVC — applied per Spot region EKS cluster
# Requires: FSx filesystem ID, DNS name, and mount name from Terraform output
# Usage: envsubst < fsx-lustre-pv.yaml | kubectl --context <ctx> apply -f -
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fsx-lustre-models-pv
spec:
  capacity:
    storage: 1200Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: fsx.csi.aws.com
    volumeHandle: "${FSX_FILESYSTEM_ID}-models"
    volumeAttributes:
      dnsname: "${FSX_DNS_NAME}"
      mountname: "${FSX_MOUNT_NAME}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fsx-lustre-models-pvc
  namespace: gpu-jobs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 1200Gi
  volumeName: fsx-lustre-models-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fsx-lustre-results-pv
spec:
  capacity:
    storage: 1200Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: fsx.csi.aws.com
    volumeHandle: "${FSX_FILESYSTEM_ID}-results"
    volumeAttributes:
      dnsname: "${FSX_DNS_NAME}"
      mountname: "${FSX_MOUNT_NAME}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fsx-lustre-results-pvc
  namespace: gpu-jobs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 1200Gi
  volumeName: fsx-lustre-results-pv
