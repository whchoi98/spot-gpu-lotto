server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (K8s service name resolved at runtime to avoid startup crash)
    location /api/ {
        resolver ${KUBE_DNS_IP} valid=5s;
        set $backend "gpu-lotto-api-server.gpu-lotto.svc.cluster.local:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check for k8s
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
