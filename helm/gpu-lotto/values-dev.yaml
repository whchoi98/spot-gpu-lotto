# helm/gpu-lotto/values-dev.yaml
# NOTE: registry and redisUrl must be provided via --set or values-dev.secret.yaml
#   helm upgrade gpu-lotto ... --set global.image.registry=$ECR_REGISTRY --set config.redisUrl=$REDIS_URL
global:
  image:
    registry: ""  # set via CI: 123456789.dkr.ecr.ap-northeast-2.amazonaws.com
    tag: "v19-arm64"

config:
  redisUrl: ""  # set via CI: rediss://master.<cluster>.cache.amazonaws.com:6379
  authEnabled: "false"
  k8sMode: "live"
  clusterPrefix: "gpu-lotto-dev"
  priceMode: "live"
  pollInterval: "30"

apiServer:
  replicas: 1
  hpa:
    enabled: false

dispatcher:
  pdb:
    enabled: false

frontend:
  replicas: 1
  image:
    tag: "v9-arm64"

ingress:
  enabled: false

networkPolicy:
  enabled: false

nodeSelector:
  kubernetes.io/arch: arm64

targetGroupBinding:
  enabled: true
  albSecurityGroupId: "sg-0a2e31c5b781cef03"
  apiServer:
    targetGroupARN: "arn:aws:elasticloadbalancing:ap-northeast-2:660619595884:targetgroup/gpu-lotto-dev-api/454ec84ea25355cc"
  frontend:
    targetGroupARN: "arn:aws:elasticloadbalancing:ap-northeast-2:660619595884:targetgroup/gpu-lotto-dev-frontend/c41d246e0a8cd8dc"

monitoring:
  enabled: true
