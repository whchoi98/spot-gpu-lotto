# helm/gpu-lotto/values-dev.yaml
# NOTE: registry and redisUrl must be provided via --set or values-dev.secret.yaml
#   helm upgrade gpu-lotto ... --set global.image.registry=$ECR_REGISTRY --set config.redisUrl=$REDIS_URL
global:
  image:
    registry: ""  # set via CI: 123456789.dkr.ecr.ap-northeast-2.amazonaws.com
    tag: "v9"

config:
  redisUrl: ""  # set via CI: rediss://master.<cluster>.cache.amazonaws.com:6379
  authEnabled: "false"
  k8sMode: "dry-run"
  clusterPrefix: "gpu-lotto-dev"
  priceMode: "live"
  pollInterval: "30"

apiServer:
  replicas: 1
  hpa:
    enabled: false

dispatcher:
  pdb:
    enabled: false

frontend:
  replicas: 1
  image:
    tag: "v6"

ingress:
  enabled: false

networkPolicy:
  enabled: false

monitoring:
  enabled: true
