{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gpu-lotto.fullname" . }}-dashboard
  namespace: {{ include "gpu-lotto.namespace" . }}
  labels:
    {{- include "gpu-lotto.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  gpu-spot-lotto.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 2,
      "style": "dark",
      "panels": [
        {
          "type": "row",
          "title": "🎰 Overview",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false
        },
        {
          "title": "Services Health",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "targets": [{"expr": "count(up{job=~\"gpu-lotto-.*\"} == 1)"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [{"options": {"3": {"text": "ALL UP", "color": "green"}, "2": {"text": "DEGRADED", "color": "yellow"}, "1": {"text": "CRITICAL", "color": "red"}, "0": {"text": "DOWN", "color": "dark-red"}}, "type": "value"}],
              "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 2}, {"color": "green", "value": 3}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"graphMode": "none", "colorMode": "background_solid", "textMode": "auto", "justifyMode": "center"}
        },
        {
          "title": "Cheapest GPU",
          "type": "stat",
          "gridPos": {"h": 4, "w": 5, "x": 4, "y": 1},
          "targets": [{"expr": "min(gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"})", "legendFormat": "Lowest"}],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 4,
              "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "#73BF69", "value": 0.2}, {"color": "yellow", "value": 0.5}, {"color": "orange", "value": 1.0}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"graphMode": "area", "colorMode": "background_solid", "textMode": "value_and_name", "justifyMode": "center"}
        },
        {
          "title": "Active Jobs",
          "type": "stat",
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 1},
          "targets": [{"expr": "gpu_lotto_jobs_active"}],
          "fieldConfig": {
            "defaults": {
              "thresholds": {"steps": [{"color": "#37872D", "value": null}, {"color": "blue", "value": 1}, {"color": "purple", "value": 10}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"graphMode": "area", "colorMode": "background_solid", "textMode": "auto", "justifyMode": "center"}
        },
        {
          "title": "Queue Depth",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 1},
          "targets": [{"expr": "gpu_lotto_queue_depth"}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 50,
              "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 10}, {"color": "orange", "value": 25}, {"color": "red", "value": 40}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"showThresholdLabels": false, "showThresholdMarkers": true, "minVizWidth": 75, "minVizHeight": 75}
        },
        {
          "title": "Jobs Dispatched",
          "type": "stat",
          "gridPos": {"h": 4, "w": 3, "x": 16, "y": 1},
          "targets": [{"expr": "sum(gpu_lotto_jobs_submitted_total)", "legendFormat": "submitted"}],
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "#8AB8FF"}}},
          "options": {"graphMode": "area", "colorMode": "background_solid", "textMode": "auto", "justifyMode": "center"}
        },
        {
          "title": "Failed",
          "type": "stat",
          "gridPos": {"h": 4, "w": 2, "x": 19, "y": 1},
          "targets": [{"expr": "sum(gpu_lotto_jobs_failed_total) or vector(0)"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "#37872D", "value": null}, {"color": "red", "value": 1}]}, "color": {"mode": "thresholds"}}},
          "options": {"graphMode": "none", "colorMode": "background_solid", "textMode": "auto", "justifyMode": "center"}
        },
        {
          "title": "Price Errors",
          "type": "stat",
          "gridPos": {"h": 4, "w": 3, "x": 21, "y": 1},
          "targets": [{"expr": "gpu_lotto_price_fetch_errors_total"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "#37872D", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}, "color": {"mode": "thresholds"}}},
          "options": {"graphMode": "area", "colorMode": "background_solid", "textMode": "auto", "justifyMode": "center"}
        },

        {
          "type": "row",
          "title": "💰 Spot Pricing Intelligence",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "collapsed": false
        },
        {
          "title": "Real-Time Spot Prices — All Regions",
          "description": "Live GPU Spot pricing across 3 AWS regions, 6 instance types",
          "type": "timeseries",
          "gridPos": {"h": 9, "w": 14, "x": 0, "y": 6},
          "targets": [{"expr": "gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"}", "legendFormat": "{{`{{region}}`}} • {{`{{instance_type}}`}}"}],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD", "decimals": 4,
              "custom": {
                "lineWidth": 2, "fillOpacity": 15, "gradientMode": "scheme",
                "pointSize": 5, "showPoints": "auto",
                "lineInterpolation": "smooth",
                "spanNulls": false, "axisBorderShow": true,
                "thresholdsStyle": {"mode": "dashed"}
              },
              "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.5}, {"color": "red", "value": 2.0}]},
              "color": {"mode": "palette-classic-by-name"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "min", "max"]}, "tooltip": {"mode": "multi", "sort": "asc"}}
        },
        {
          "title": "Current Prices — By Region",
          "description": "Bar chart comparing prices across regions",
          "type": "bargauge",
          "gridPos": {"h": 9, "w": 10, "x": 14, "y": 6},
          "targets": [{"expr": "sort_desc(gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"})", "legendFormat": "{{`{{region}}`}} / {{`{{instance_type}}`}}", "instant": true}],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD", "decimals": 4,
              "thresholds": {"steps": [{"color": "#37872D", "value": null}, {"color": "#73BF69", "value": 0.2}, {"color": "yellow", "value": 0.5}, {"color": "orange", "value": 1.0}, {"color": "red", "value": 3.0}]},
              "color": {"mode": "thresholds"},
              "min": 0, "max": 6
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "valueMode": "color", "showUnfilled": true, "minVizWidth": 8, "minVizHeight": 16, "namePlacement": "auto"}
        },
        {
          "title": "💎 Best Deals — Cheapest per GPU Type",
          "type": "table",
          "gridPos": {"h": 7, "w": 14, "x": 0, "y": 15},
          "targets": [{
            "expr": "gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"} == on(instance_type) group_left min by(instance_type)(gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"})",
            "format": "table",
            "instant": true
          }],
          "fieldConfig": {
            "defaults": {"unit": "currencyUSD", "decimals": 4},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [
                {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "gradient-scheme"}},
                {"id": "thresholds", "value": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.5}, {"color": "orange", "value": 1.5}, {"color": "red", "value": 5}]}}
              ]},
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "__name__"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "job"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "instance"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "region"}, "properties": [{"id": "displayName", "value": "🌎 Region"}, {"id": "custom.width", "value": 140}]},
              {"matcher": {"id": "byName", "options": "instance_type"}, "properties": [{"id": "displayName", "value": "🖥 GPU Type"}, {"id": "custom.width", "value": 140}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [{"id": "displayName", "value": "💲 Price/hr"}]}
            ]
          },
          "options": {"showHeader": true, "footer": {"show": false}, "frameIndex": 0}
        },
        {
          "title": "Price Spread — Min vs Max per GPU",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 10, "x": 14, "y": 15},
          "targets": [
            {"expr": "min by(instance_type)(gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"})", "legendFormat": "MIN {{`{{instance_type}}`}}"},
            {"expr": "max by(instance_type)(gpu_lotto_spot_price{region=~\"$region\", instance_type=~\"$instance_type\"})", "legendFormat": "MAX {{`{{instance_type}}`}}"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD", "decimals": 4,
              "custom": {"lineWidth": 2, "fillOpacity": 10, "gradientMode": "opacity", "lineInterpolation": "smooth"}
            },
            "overrides": [
              {"matcher": {"id": "byRegexp", "options": "MIN.*"}, "properties": [{"id": "custom.lineStyle", "value": {"fill": "solid"}}, {"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]},
              {"matcher": {"id": "byRegexp", "options": "MAX.*"}, "properties": [{"id": "custom.lineStyle", "value": {"fill": "dash", "dash": [10, 10]}}, {"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}
            ]
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi", "sort": "asc"}}
        },

        {
          "type": "row",
          "title": "🚀 Jobs & Dispatch",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
          "collapsed": false
        },
        {
          "title": "Job Submission Rate",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 23},
          "targets": [
            {"expr": "rate(gpu_lotto_jobs_submitted_total[5m]) * 60", "legendFormat": "submitted/min"},
            {"expr": "sum(rate(gpu_lotto_jobs_failed_total[5m])) * 60", "legendFormat": "failed/min"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "opm", "custom": {"lineWidth": 2, "fillOpacity": 20, "gradientMode": "scheme", "lineInterpolation": "smooth", "axisBorderShow": true}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "submitted/min"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#8AB8FF"}}]},
              {"matcher": {"id": "byName", "options": "failed/min"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FF6B6B"}}, {"id": "custom.fillOpacity", "value": 40}]}
            ]
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}}
        },
        {
          "title": "Queue Depth Over Time",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 23},
          "targets": [{"expr": "gpu_lotto_queue_depth", "legendFormat": "pending jobs"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineWidth": 2, "fillOpacity": 30, "gradientMode": "scheme", "lineInterpolation": "smooth", "thresholdsStyle": {"mode": "area"}},
              "thresholds": {"steps": [{"color": "transparent", "value": null}, {"color": "rgba(255, 152, 48, 0.1)", "value": 10}, {"color": "rgba(255, 76, 76, 0.2)", "value": 25}]},
              "color": {"mode": "fixed", "fixedColor": "#B877D9"}
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}
        },
        {
          "title": "Job Retries",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 23},
          "targets": [
            {"expr": "rate(gpu_lotto_jobs_retried_total[5m]) * 60", "legendFormat": "retries/min"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "opm",
              "custom": {"lineWidth": 2, "fillOpacity": 25, "gradientMode": "opacity", "lineInterpolation": "smooth"},
              "color": {"mode": "fixed", "fixedColor": "#FADE2A"}
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}}
        },
        {
          "title": "Dispatch by Region",
          "description": "Cumulative jobs dispatched per region",
          "type": "piechart",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 30},
          "targets": [{"expr": "gpu_lotto_jobs_dispatched_total", "legendFormat": "{{`{{region}}`}}", "instant": true}],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic-by-name"}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "us-east-1"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FF9830"}}]},
              {"matcher": {"id": "byName", "options": "us-east-2"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#73BF69"}}]},
              {"matcher": {"id": "byName", "options": "us-west-2"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#B877D9"}}]}
            ]
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]}, "tooltip": {"mode": "single"}, "pieType": "donut", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "title": "Region Capacity (Available Slots)",
          "description": "Real-time GPU capacity per region from Redis",
          "type": "bargauge",
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 30},
          "targets": [{"expr": "gpu_lotto_region_capacity", "legendFormat": "{{`{{region}}`}}", "instant": true}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 16,
              "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "orange", "value": 4}, {"color": "yellow", "value": 8}, {"color": "green", "value": 12}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "minVizWidth": 8, "minVizHeight": 16}
        },
        {
          "title": "Dispatch Rate by Region",
          "description": "Jobs dispatched per minute, broken down by region",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 30},
          "targets": [{"expr": "rate(gpu_lotto_jobs_dispatched_total[5m]) * 60", "legendFormat": "{{`{{region}}`}}"}],
          "fieldConfig": {
            "defaults": {
              "unit": "opm",
              "custom": {"lineWidth": 2, "fillOpacity": 20, "gradientMode": "scheme", "lineInterpolation": "smooth", "stacking": {"mode": "normal"}},
              "color": {"mode": "palette-classic-by-name"}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "us-east-1"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FF9830"}}]},
              {"matcher": {"id": "byName", "options": "us-east-2"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#73BF69"}}]},
              {"matcher": {"id": "byName", "options": "us-west-2"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#B877D9"}}]}
            ]
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["sum"]}, "tooltip": {"mode": "multi", "sort": "desc"}}
        },

        {
          "type": "row",
          "title": "⚡ API Performance",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 37},
          "collapsed": false
        },
        {
          "title": "API Latency Distribution",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 38},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(gpu_lotto_api_request_duration_seconds_bucket[5m]))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.90, rate(gpu_lotto_api_request_duration_seconds_bucket[5m]))", "legendFormat": "p90"},
            {"expr": "histogram_quantile(0.99, rate(gpu_lotto_api_request_duration_seconds_bucket[5m]))", "legendFormat": "p99"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s", "decimals": 3,
              "custom": {"lineWidth": 2, "fillOpacity": 10, "gradientMode": "opacity", "lineInterpolation": "smooth"}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "p50"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#73BF69"}}]},
              {"matcher": {"id": "byName", "options": "p90"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FADE2A"}}]},
              {"matcher": {"id": "byName", "options": "p99"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FF6B6B"}}, {"id": "custom.fillOpacity", "value": 5}]}
            ]
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi", "sort": "desc"}}
        },
        {
          "title": "API Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 6, "x": 12, "y": 38},
          "targets": [{"expr": "rate(gpu_lotto_api_request_duration_seconds_count[5m]) * 60", "legendFormat": "req/min"}],
          "fieldConfig": {
            "defaults": {
              "unit": "reqpm",
              "custom": {"lineWidth": 2, "fillOpacity": 30, "gradientMode": "scheme", "lineInterpolation": "smooth", "axisBorderShow": true},
              "color": {"mode": "fixed", "fixedColor": "#8AB8FF"}
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}}
        },
        {
          "title": "Price Collection Interval",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 6, "x": 18, "y": 38},
          "targets": [{"expr": "rate(gpu_lotto_price_fetch_errors_total[5m]) * 300", "legendFormat": "errors/5m"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineWidth": 2, "fillOpacity": 25, "gradientMode": "opacity", "lineInterpolation": "smooth", "thresholdsStyle": {"mode": "area"}},
              "thresholds": {"steps": [{"color": "transparent", "value": null}, {"color": "rgba(255, 76, 76, 0.2)", "value": 1}]},
              "color": {"mode": "fixed", "fixedColor": "#FF9830"}
            }
          },
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}}
        },

        {
          "type": "row",
          "title": "🏗 Infrastructure — Pods",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 45},
          "collapsed": false
        },
        {
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 46},
          "targets": [{"expr": "sum by(pod) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[5m]))", "legendFormat": "{{`{{pod}}`}}"}],
          "fieldConfig": {
            "defaults": {
              "unit": "short", "decimals": 3,
              "custom": {"lineWidth": 1, "fillOpacity": 20, "gradientMode": "scheme", "lineInterpolation": "smooth", "stacking": {"mode": "normal"}},
              "color": {"mode": "palette-classic-by-name"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi", "sort": "desc"}}
        },
        {
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 46},
          "targets": [{"expr": "sum by(pod) (container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"})", "legendFormat": "{{`{{pod}}`}}"}],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {"lineWidth": 1, "fillOpacity": 20, "gradientMode": "scheme", "lineInterpolation": "smooth", "stacking": {"mode": "normal"}},
              "color": {"mode": "palette-classic-by-name"}
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi", "sort": "desc"}}
        },
        {
          "title": "Pod Ready Status",
          "type": "table",
          "gridPos": {"h": 5, "w": 12, "x": 0, "y": 53},
          "targets": [{"expr": "kube_pod_status_ready{namespace=~\"$namespace\", condition=\"true\"}", "format": "table", "instant": true}],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "__name__"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "instance"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "job"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "uid"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "condition"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "pod"}, "properties": [{"id": "displayName", "value": "Pod"}, {"id": "custom.width", "value": 350}]},
              {"matcher": {"id": "byName", "options": "namespace"}, "properties": [{"id": "displayName", "value": "Namespace"}, {"id": "custom.width", "value": 120}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [
                {"id": "displayName", "value": "Ready"},
                {"id": "mappings", "value": [{"options": {"0": {"text": "NOT READY", "color": "red"}, "1": {"text": "READY", "color": "green"}}, "type": "value"}]},
                {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                {"id": "custom.width", "value": 100}
              ]}
            ]
          },
          "options": {"showHeader": true}
        },
        {
          "title": "Deployment Replicas",
          "type": "bargauge",
          "gridPos": {"h": 5, "w": 12, "x": 12, "y": 53},
          "targets": [{"expr": "kube_deployment_spec_replicas{namespace=~\"$namespace\"}", "legendFormat": "{{`{{deployment}}`}}", "instant": true}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 5,
