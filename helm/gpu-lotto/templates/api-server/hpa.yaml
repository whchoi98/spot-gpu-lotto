# helm/gpu-lotto/templates/api-server/hpa.yaml
{{- if .Values.apiServer.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gpu-lotto.fullname" . }}-api-server
  namespace: {{ include "gpu-lotto.namespace" . }}
  labels:
    {{- include "gpu-lotto.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "gpu-lotto.fullname" . }}-api-server
  minReplicas: {{ .Values.apiServer.hpa.minReplicas }}
  maxReplicas: {{ .Values.apiServer.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiServer.hpa.targetCPUUtilization }}
{{- end }}
