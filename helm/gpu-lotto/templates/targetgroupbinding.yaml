{{/* TargetGroupBinding — binds existing ALB Target Groups to K8s Services.
     AWS LB Controller auto-syncs Pod IPs into the target groups,
     eliminating the need for manual target re-registration after pod restarts. */}}

{{- if .Values.targetGroupBinding.enabled }}

{{- if .Values.targetGroupBinding.apiServer.targetGroupARN }}
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: {{ include "gpu-lotto.fullname" . }}-api-server
  namespace: {{ include "gpu-lotto.namespace" . }}
  labels:
    {{- include "gpu-lotto.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-server
spec:
  serviceRef:
    name: {{ include "gpu-lotto.fullname" . }}-api-server
    port: {{ .Values.apiServer.port }}
  targetGroupARN: {{ .Values.targetGroupBinding.apiServer.targetGroupARN }}
  targetType: ip
  {{- if .Values.targetGroupBinding.albSecurityGroupId }}
  networking:
    ingress:
      - from:
          - securityGroup:
              groupID: {{ .Values.targetGroupBinding.albSecurityGroupId }}
        ports:
          - port: {{ .Values.apiServer.port }}
            protocol: TCP
  {{- end }}
{{- end }}

---

{{- if .Values.targetGroupBinding.frontend.targetGroupARN }}
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: {{ include "gpu-lotto.fullname" . }}-frontend
  namespace: {{ include "gpu-lotto.namespace" . }}
  labels:
    {{- include "gpu-lotto.labels" . | nindent 4 }}
    app.kubernetes.io/name: frontend
spec:
  serviceRef:
    name: {{ include "gpu-lotto.fullname" . }}-frontend
    port: {{ .Values.frontend.port }}
  targetGroupARN: {{ .Values.targetGroupBinding.frontend.targetGroupARN }}
  targetType: ip
  {{- if .Values.targetGroupBinding.albSecurityGroupId }}
  networking:
    ingress:
      - from:
          - securityGroup:
              groupID: {{ .Values.targetGroupBinding.albSecurityGroupId }}
        ports:
          - port: {{ .Values.frontend.port }}
            protocol: TCP
  {{- end }}
{{- end }}

{{- end }}
